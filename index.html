<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Equilibria Lab — Simulador de equilibrio químico</title>
    <script>
      // Apply the stored (or system) theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('equilibria-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme =
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
      })();
      // Same reasoning for language: the static lang="es" default above is
      // just a fallback for pre-JS crawlers — resolve the real one (stored,
      // else browser) before first paint so useLanguage()'s initial state
      // (which trusts document.documentElement.lang) isn't stuck reading a
      // hardcoded default instead of what the user actually chose.
      (function () {
        try {
          var l = localStorage.getItem('equilibria-lang');
          if (l !== 'es' && l !== 'en') {
            l = navigator.language.toLowerCase().indexOf('en') === 0 ? 'en' : 'es';
          }
          document.documentElement.lang = l;
        } catch (e) {
          document.documentElement.lang =
            navigator.language.toLowerCase().indexOf('en') === 0 ? 'en' : 'es';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
